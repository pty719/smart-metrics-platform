# ============================================================
# docker-compose.prod.yml — Production deployment
# ============================================================
#
# Usage:
#   # 1. Copy and fill in secrets
#   cp .env.example .env
#
#   # 2. Build and start all services
#   docker compose -f docker-compose.prod.yml up -d --build
#
#   # 3. View logs
#   docker compose -f docker-compose.prod.yml logs -f app
#
#   # 4. Stop
#   docker compose -f docker-compose.prod.yml down
#
# Key differences from docker-compose.yml (dev):
#   - Source code is NOT volume-mounted (immutable image)
#   - Uvicorn --reload is disabled; Gunicorn manages workers
#   - DB and Redis ports are NOT exposed to the host
#   - Nginx terminates HTTP and proxies to the app
#   - restart: unless-stopped on all services
#   - Memory limits prevent OOM kills from affecting neighbours
# ============================================================

services:

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      # Uncomment to expose HTTPS (requires SSL cert in nginx/ssl/):
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount SSL certificates when TLS is configured:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64m

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port exposure — only accessible inside the backend network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --maxmemory 200mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # No host port exposure — only accessible inside the backend network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256m

  # ── FastAPI application ────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime          # Use the slim runtime stage
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn app.main:app
          -k uvicorn.workers.UvicornWorker
          --workers ${WORKERS:-2}
          --bind 0.0.0.0:8000
          --timeout 120
          --graceful-timeout 30
          --access-logfile -
          --error-logfile -
          --log-level ${LOG_LEVEL:-info}
      "
    environment:
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      API_KEY:           ${API_KEY}
      DEBUG:             "false"
      LOG_LEVEL:         ${LOG_LEVEL:-info}
      LOG_FORMAT:        ${LOG_FORMAT:-json}
      CORS_ORIGINS:      ${CORS_ORIGINS:-}
      WORKERS:           ${WORKERS:-2}
      CACHE_TTL_STATS:   ${CACHE_TTL_STATS:-300}
      CACHE_TTL_ANOMALIES: ${CACHE_TTL_ANOMALIES:-60}
      CACHE_TTL_MA:      ${CACHE_TTL_MA:-600}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Celery worker ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: >
      celery -A app.core.celery_app.celery_app worker
        --loglevel=${LOG_LEVEL:-info}
        --concurrency=${CELERY_CONCURRENCY:-4}
        --max-tasks-per-child=100
    environment:
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      LOG_LEVEL:         ${LOG_LEVEL:-info}
      LOG_FORMAT:        ${LOG_FORMAT:-json}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

# ── Networks ───────────────────────────────────────────────────
networks:
  frontend:
    # Nginx is the only service in both networks.
    # The backend network is internal: DB/Redis/app are not reachable
    # from the host directly.
  backend:
    internal: true

# ── Persistent volumes ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
