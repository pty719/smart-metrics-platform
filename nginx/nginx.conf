# ============================================================
# Nginx reverse-proxy configuration for Smart Metrics Platform
# ============================================================
# This file is mounted read-only into the nginx container via
# docker-compose.prod.yml.
#
# HTTPS setup (recommended for production):
#   1. Obtain a certificate (Let's Encrypt / self-signed):
#        certbot certonly --standalone -d your-domain.com
#   2. Place cert files in nginx/ssl/:
#        nginx/ssl/fullchain.pem
#        nginx/ssl/privkey.pem
#   3. Uncomment the HTTPS server block below and comment out
#      the plain HTTP block.
# ============================================================

upstream app_servers {
    server app:8000;
    # Add more replicas here if you scale the app service:
    # server app_2:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (uncomment when TLS is configured) ─
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

# ── Plain HTTP (default, suitable for behind a TLS load-balancer) ─
server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Client body size (adjust for bulk data uploads) ──────
    client_max_body_size 10m;

    # ── FastAPI proxy ─────────────────────────────────────────
    location / {
        proxy_pass         http://app_servers;
        proxy_http_version 1.1;

        # Required headers for FastAPI request context
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket / keep-alive support
        proxy_set_header   Connection        "";

        # Timeouts — increase if forecast tasks take longer
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     120s;
    }

    # ── Health check (bypass auth for load-balancer probes) ──
    location /health {
        proxy_pass         http://app_servers/health;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

